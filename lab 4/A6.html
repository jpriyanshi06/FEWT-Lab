<!--6. Write an HTML page with JavaScript that takes a number from popup box in the range 0-999 
and display it in words. If the number is out of range, it should show “out of range” and 
if it is not a number ,it should show “not a number” message in the result box. (A)-->
<!DOCTYPE html>
<html>
<head>
    <title>Number to Words</title>
</head>
<body>

<script>
    let num = prompt("Enter a number (0-999):");

    if (isNaN(num)) {
        document.write("Not a Number");
    }
    else {
        num = parseInt(num);

        if (num < 0 || num > 999) {
            document.write("Out of Range");
        }
        else {
            let ones = ["Zero","One","Two","Three","Four","Five","Six","Seven","Eight","Nine"];
            let teens = ["Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
            let tens = ["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];

            let words = "";

            if (num >= 100) {
                words += ones[(Math.floor)(num / 100)] + " Hundred ";
                num %= 100;
            }

            if (num >= 20) {
                words += tens[(Math.floor)(num / 10)] + " ";
                num %= 10;
            }
            else if (num >= 10) {
                words += teens[num - 10] + " ";
                num = 0;
            }

            if (num > 0 || words == "") {
                words += ones[num];
            }

            document.write(words);
        }
    }
</script>
</body>
</html>
