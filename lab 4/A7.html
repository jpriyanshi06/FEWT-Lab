<!--7. Write an HTML ƒle with JavaScript that ƒnds position of ƒrst occurrence of vowel “a”,
 last occurrence of vowel “a” in a given word and returns the string between them. 
For example, ajanta- then script would return ƒrst occurrence of “a”-that is position 1 and last
occurrence-6 and string between them is “jant”. (B)-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let str = prompt("enter string :");

        let first = str.indexOf('a');
        let last = str.lastIndexOf('a');

        if(first == -1){
            document.write("letter a is not found")
        }
        else{
            let middle = str.substring((first+1),last);
            document.write("first occurence of a = "+(first+1)+"<br/>");
            document.write("last occurence of a = "+(last+1)+"<br/>");
            document.write("middle = "+ middle);
        }
    </script>
</body>
</html>
