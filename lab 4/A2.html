<!--2. WAP in JavaScript to prime number between the given range of number. (A)-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <script>
       let m=parseInt(prompt("enter range : "));
       let n=parseInt(prompt("enter range : "));
        for(i=m;i<=n;i++){
            let count=0;
            for(j=1;j<=i;j++){
                if(i%j==0){
                    count++;
                }
            }
            if(count==2){
                alert(i);
            }
        }
    </script>
</body>
</html>
