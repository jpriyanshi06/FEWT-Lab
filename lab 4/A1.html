<!--1. WAP in JavaScript to print the factors of given number. (A)-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
       let n=parseInt(prompt("enter num : "));
        let ans=1;
        for(let i=1;i<=n;i++){
            ans=ans*i;
        }
        document.write("factorial = "+ ans);
    </script>
    
</body>
</html>
