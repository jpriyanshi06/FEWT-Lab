<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num=parseInt(prompt("enter num : "));
        let a=0,b=1;
        for(let i=0;i<num;i++){
            let c=a+b;
           document.write(a);
            a=b;
            b=c;
        }
    </script>
</body>
</html>
