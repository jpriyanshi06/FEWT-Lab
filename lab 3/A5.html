<body>
    <script>
        let num=parseInt(prompt("enter num : "));
        let temp=num;
        let sum=0;
        while(num!=0){
            let rem=num%10;
             sum=sum*10+rem;
            num=parseInt(num/10);
        }
        if(sum==temp){
            alert("number is pelindrom");
        }
        else{
            alert("num is not pelindrom");
        }
    </script>
</body>
