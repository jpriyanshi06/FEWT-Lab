<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    
        let num = parseInt(prompt("Enter"));
let original = num;
let sum = 0;

let digits = num.toString().length;

while (num > 0) {
    let rem = num % 10;
    sum = sum + rem ** digits;
    num = parseInt(num / 10);
}

if (sum == original)
    alert("Yes, Armstrong Number");
else
    alert("No, Not an Armstrong Number");

    </script>
</body>
</html>
